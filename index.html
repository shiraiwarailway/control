<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鉄道運行管理システム (OCC & Crew)</title>
  
  <!-- Tailwind CSS Configuration -->
  <script>
    window.tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            height: {
              'screen-dvh': '100dvh',
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'ring': 'ring 0.5s ease-in-out',
            },
            keyframes: {
              ring: {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '25%': { transform: 'rotate(15deg)' },
                '75%': { transform: 'rotate(-15deg)' },
              }
            }
          }
        }
      }
    };
  </script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 全体の見切れ防止 */
    html, body { height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
    
    /* スクロールバー調整 */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    
    /* チャット吹き出し用 */
    .chat-bubble-self { background-color: #3b82f6; color: white; border-bottom-right-radius: 0; }
    .chat-bubble-other { background-color: #f1f5f9; color: #1e293b; border-bottom-left-radius: 0; }
    .dark .chat-bubble-other { background-color: #1e293b; color: #f8fafc; }
    
    .chat-bubble-global-self { background-color: #ef4444; color: white; border-bottom-right-radius: 0; }
    .chat-bubble-global-other { background-color: #fef2f2; color: #991b1b; border-left: 3px solid #ef4444; border-bottom-left-radius: 0; }
    .dark .chat-bubble-global-other { background-color: #7f1d1d/40; color: #fca5a5; border-left: 3px solid #ef4444; border-bottom-left-radius: 0; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-800 dark:text-slate-200 h-screen-dvh flex flex-col transition-colors duration-200">

  <!-- ========================================== -->
  <!-- 1. 接続中・ローディング画面                -->
  <!-- ========================================== -->
  <div id="loading-screen" class="fixed inset-0 z-50 flex h-full items-center justify-center bg-slate-950">
    <div class="flex flex-col items-center text-slate-400">
      <i data-lucide="activity" class="w-10 h-10 animate-spin mb-4 text-blue-500"></i>
      <p class="text-sm font-medium">システムに接続中...</p>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 2. 役職選択画面 (ログイン)                 -->
  <!-- ========================================== -->
  <div id="role-selection-screen" class="hidden fixed inset-0 z-40 flex h-full items-center justify-center bg-slate-900 p-4">
    <div class="bg-white dark:bg-slate-950 p-6 lg:p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-200 dark:border-slate-800">
      <div class="text-center mb-6 lg:mb-8">
        <i data-lucide="train" class="w-10 h-10 lg:w-12 lg:h-12 text-blue-600 mx-auto mb-3"></i>
        <h2 class="text-xl lg:text-2xl font-bold text-slate-900 dark:text-white">システム ログイン</h2>
        <p class="text-slate-500 text-sm mt-1">担当する役職を選択してください</p>
      </div>

      <div class="space-y-4 lg:space-y-6">
        <button id="btn-login-occ" class="w-full flex items-center justify-between p-3 lg:p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-slate-900 transition-all group">
          <div class="flex items-center gap-3">
            <div class="p-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg">
              <i data-lucide="radio" class="w-5 h-5"></i>
            </div>
            <div class="text-left">
              <div class="font-bold text-slate-900 dark:text-white text-sm lg:text-base">指令所 (OCC)</div>
              <div class="text-[10px] lg:text-xs text-slate-500">全線の運行管理と指令発令</div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="text-slate-400 group-hover:text-blue-500"></i>
        </button>

        <div class="relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-slate-800"></div></div>
          <div class="relative flex justify-center text-xs lg:text-sm"><span class="px-2 bg-white dark:bg-slate-950 text-slate-500">または</span></div>
        </div>

        <div class="p-3 lg:p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
          <div class="flex items-center gap-3 mb-3">
            <div class="p-2 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-lg">
              <i data-lucide="user-check" class="w-5 h-5"></i>
            </div>
            <div class="text-left">
              <div class="font-bold text-slate-900 dark:text-white text-sm lg:text-base">乗務員 (Train Crew)</div>
              <div class="text-[10px] lg:text-xs text-slate-500">担当車両を選択して乗務開始</div>
            </div>
          </div>
          
          <select id="login-train-select" class="w-full mb-3 p-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-xs lg:text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">担当車両を選択してください</option>
          </select>

          <div class="grid grid-cols-2 gap-2">
            <button id="btn-login-driver" disabled class="disabled:opacity-50 disabled:cursor-not-allowed p-2 text-xs lg:text-sm font-bold bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition-colors font-medium">運転士として乗務</button>
            <button id="btn-login-conductor" disabled class="disabled:opacity-50 disabled:cursor-not-allowed p-2 text-xs lg:text-sm font-bold bg-teal-600 hover:bg-teal-500 text-white rounded-lg transition-colors font-medium">車掌として乗務</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 3. メインアプリケーション画面              -->
  <!-- ========================================== -->
  <div id="app-root" class="hidden h-full flex flex-col overflow-hidden">
    
    <!-- ヘッダー -->
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-2 lg:p-3 flex justify-between items-center z-20 shrink-0">
      <div class="flex items-center gap-2">
        <div id="header-icon-container" class="text-blue-600 dark:text-blue-500"></div>
        <div>
          <h1 id="header-title" class="text-sm lg:text-base font-bold tracking-widest text-slate-900 dark:text-slate-50 leading-tight">RAILWAY OCC</h1>
          <div id="header-subtitle" class="text-[9px] text-slate-500 font-normal">Operation Control Center</div>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <!-- 通知ベルボタン -->
        <button id="btn-notifications" class="relative p-1.5 lg:p-2 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-300 transition-colors" title="通知を確認">
          <i id="bell-icon" data-lucide="bell" class="w-4 h-4 lg:w-5 lg:h-5"></i>
          <span id="notification-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-slate-100 dark:border-slate-800 shadow-sm">0</span>
        </button>

        <button id="btn-theme-toggle" class="p-1.5 lg:p-2 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-300 transition-colors" title="モード切り替え">
          <i id="theme-icon" data-lucide="moon" class="w-4 h-4 lg:w-5 lg:h-5"></i>
        </button>

        <button id="btn-logout" class="p-1.5 lg:p-2 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-950/30 dark:text-red-400 transition-colors" title="退室・ログアウト">
          <i data-lucide="log-out" class="w-4 h-4 lg:w-5 lg:h-5"></i>
        </button>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="flex-1 overflow-hidden relative flex flex-col lg:flex-row w-full h-full">
      
      <!-- ========================================== -->
      <!-- VIEW A: 指令所 (OCC) モード                  -->
      <!-- ========================================== -->
      <main id="occ-view" class="hidden flex-1 flex flex-col lg:flex-row w-full h-full overflow-hidden">
        <!-- 左側: 管轄車両リスト -->
        <div class="flex-1 flex flex-col min-w-0 border-r-0 lg:border-r border-slate-200 dark:border-slate-800 overflow-hidden">
          <div class="p-2 lg:p-3 bg-slate-100/80 dark:bg-slate-900 shrink-0 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
            <h2 class="text-sm font-bold flex items-center gap-2">
              <i data-lucide="train" class="w-4 h-4 text-blue-500"></i> 管轄車両状況
            </h2>
            <button id="btn-broadcast" class="items-center gap-1.5 px-2 py-1 rounded bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 dark:bg-red-950/30 dark:border-red-900/50 text-[10px] font-bold transition-all">
              <i data-lucide="megaphone" class="w-3 h-3 inline animate-bounce"></i> 一斉指令
            </button>
          </div>
          <!-- リスト領域 (内部でスクロール) -->
          <div id="occ-trains-grid" class="flex-1 overflow-y-auto p-3 grid grid-cols-1 sm:grid-cols-2 gap-3 pb-6"></div>
        </div>

        <!-- 右側: 指令・チャットパネル -->
        <div id="occ-dispatch-pane" class="w-full lg:w-[400px] h-[55dvh] lg:h-full flex flex-col bg-white dark:bg-slate-900 shrink-0 border-t lg:border-t-0 border-slate-300 dark:border-slate-700">
          <!-- タブ -->
          <div class="flex border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 shrink-0">
            <button id="tab-btn-dispatch" class="flex-1 py-2 lg:py-3 text-xs font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400">指令発令</button>
            <button id="tab-btn-chat" class="flex-1 py-2 lg:py-3 text-xs font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 flex items-center justify-center gap-1 relative">
              個別連絡
              <span id="occ-chat-badge" class="hidden absolute top-2 right-4 w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            </button>
            <button id="tab-btn-global-chat" class="flex-1 py-2 lg:py-3 text-xs font-bold border-b-2 border-transparent text-red-500 flex justify-center gap-1">全体チャット</button>
          </div>

          <!-- コンテンツ: 指令発令 -->
          <div id="tab-content-dispatch" class="flex-1 flex flex-col overflow-hidden">
            <div class="p-3 border-b border-slate-200 dark:border-slate-800 shrink-0">
              <div id="occ-empty-state" class="hidden h-24 flex items-center justify-center text-slate-400 border border-dashed border-slate-300 dark:border-slate-700 rounded-xl text-xs">車両または一斉指令を選択してください</div>
              <form id="occ-directive-form" class="hidden flex flex-col space-y-2">
                <div class="flex items-center justify-between">
                  <h3 id="occ-form-title" class="font-bold text-sm">指令発令</h3>
                  <button type="button" id="btn-close-occ-form" class="lg:hidden p-1 bg-slate-100 dark:bg-slate-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-2" id="occ-type-grid"></div>
                <textarea id="occ-directive-msg" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs outline-none resize-none" rows="2" placeholder="指示を入力（空欄可）"></textarea>
                <button type="submit" id="btn-submit-directive" class="w-full py-2 bg-blue-600 text-white rounded-lg font-bold text-xs shadow-md">発信</button>
              </form>
            </div>
            
            <div class="flex-1 flex flex-col overflow-hidden bg-slate-50 dark:bg-slate-900/30">
              <div class="p-2 text-[10px] font-bold text-slate-500 bg-slate-100 dark:bg-slate-900 shrink-0 border-b border-slate-200 dark:border-slate-800"><i data-lucide="history" class="inline w-3 h-3 mr-1"></i>指令ログ</div>
              <div id="occ-directives-log" class="flex-1 overflow-y-auto p-2 space-y-2 pb-6"></div>
            </div>
          </div>

          <!-- コンテンツ: 個別連絡 -->
          <div id="tab-content-chat" class="hidden flex-1 flex flex-col bg-white dark:bg-slate-900 overflow-hidden">
            <div id="occ-chat-target-name" class="p-2 text-xs font-bold text-center border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 shrink-0">車両を選択してください</div>
            <div id="occ-chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50/50 dark:bg-slate-950/50 pb-4"></div>
            <form id="occ-chat-form" class="p-2 border-t border-slate-200 dark:border-slate-800 flex gap-2 shrink-0 pb-6 lg:pb-3">
              <input type="text" id="occ-chat-input" disabled class="flex-1 bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50" placeholder="個別メッセージ...">
              <button type="submit" id="btn-send-occ-chat" disabled class="bg-blue-600 text-white px-3 rounded-lg disabled:opacity-50"><i data-lucide="send" class="w-3 h-3"></i></button>
            </form>
          </div>

          <!-- コンテンツ: 全体チャット -->
          <div id="tab-content-global-chat" class="hidden flex-1 flex flex-col bg-white dark:bg-slate-900 overflow-hidden">
            <div class="p-2 text-[10px] font-bold text-center border-b border-red-200 dark:border-red-900/40 bg-red-50 dark:bg-red-950/20 text-red-700 dark:text-red-400 shrink-0">全線一斉連絡チャット</div>
            <div id="occ-global-messages" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50/50 dark:bg-slate-950/50 pb-4"></div>
            <form id="occ-global-chat-form" class="p-2 border-t border-slate-200 dark:border-slate-800 flex gap-2 shrink-0 pb-6 lg:pb-3">
              <input type="text" id="occ-global-chat-input" class="flex-1 bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-red-500" placeholder="全線へ一斉送信...">
              <button type="submit" class="bg-red-600 text-white px-3 rounded-lg"><i data-lucide="send" class="w-3 h-3"></i></button>
            </form>
          </div>
        </div>
      </main>

      <!-- ========================================== -->
      <!-- VIEW B: 乗務員 (Train Crew) モード           -->
      <!-- ========================================== -->
      <main id="train-view" class="hidden flex-1 flex flex-col w-full h-full overflow-hidden">
        
        <!-- ステータス表示 -->
        <div class="p-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50 dark:bg-slate-900 shrink-0">
          <div>
            <div class="text-[10px] text-slate-500 mb-0.5">現在の指令ステータス</div>
            <div id="train-current-status" class="flex items-center gap-2"></div>
          </div>
          <div id="train-crew-badge" class="text-[10px] font-bold px-2 py-1 rounded"></div>
        </div>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
          
          <!-- 左側: チャットエリア -->
          <div class="flex-1 flex flex-col border-b lg:border-b-0 lg:border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 h-[50dvh] lg:h-full overflow-hidden shrink-0">
            <div class="flex border-b border-slate-200 dark:border-slate-800 bg-slate-100/60 dark:bg-slate-900/40 shrink-0">
              <button id="train-tab-btn-local" class="flex-1 py-2 text-[10px] font-bold border-b-2 border-emerald-500 text-emerald-600">指令所個別連絡</button>
              <button id="train-tab-btn-global" class="flex-1 py-2 text-[10px] font-bold border-b-2 border-transparent text-slate-500 flex justify-center gap-1"><i data-lucide="users" class="w-3 h-3"></i>全体チャット</button>
            </div>

            <!-- 個別チャット -->
            <div id="train-chat-local-container" class="flex-1 flex flex-col overflow-hidden">
              <div id="train-chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50/30 dark:bg-slate-900/10 pb-4"></div>
              <form id="train-chat-form" class="p-2 border-t border-slate-200 dark:border-slate-800 flex gap-2 shrink-0 pb-6 lg:pb-3">
                <input type="text" id="train-chat-input" class="flex-1 bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-emerald-500" placeholder="指令所へ報告...">
                <button type="submit" class="bg-emerald-600 text-white px-3 rounded-lg"><i data-lucide="send" class="w-3 h-3"></i></button>
              </form>
            </div>

            <!-- 全体チャット -->
            <div id="train-chat-global-container" class="hidden flex-1 flex flex-col overflow-hidden">
              <div id="train-global-messages" class="flex-1 overflow-y-auto p-3 space-y-3 bg-red-50/10 dark:bg-red-950/5 pb-4"></div>
              <form id="train-global-chat-form" class="p-2 border-t border-slate-200 dark:border-slate-800 flex gap-2 shrink-0 pb-6 lg:pb-3">
                <input type="text" id="train-global-chat-input" class="flex-1 bg-slate-100 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-red-500" placeholder="全列車・指令所へ発信...">
                <button type="submit" class="bg-red-600 text-white px-3 rounded-lg shadow"><i data-lucide="send" class="w-3 h-3"></i></button>
              </form>
            </div>
          </div>

          <!-- 右側: 指令ログ (Read Only) -->
          <div class="w-full lg:w-[300px] flex flex-col bg-slate-50 dark:bg-slate-900/50 h-[30dvh] lg:h-full shrink-0 overflow-hidden">
            <div class="p-2 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 font-bold text-[10px] lg:text-xs flex items-center gap-1 shrink-0">
              <i data-lucide="radio-receiver" class="w-3 h-3 text-blue-500"></i> 指令受信ログ
            </div>
            <div id="train-directives-log" class="flex-1 overflow-y-auto p-2 space-y-2 pb-6"></div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- ========================================== -->
  <!-- Firebase & Application Logic               -->
  <!-- ========================================== -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, addDoc, serverTimestamp, arrayUnion } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================

    // あなたのプロジェクトの設定を直接組み込みました。
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDADweWiBFqvNV0TXLaJNwoDwMnLeZH_O4",
      authDomain: "railwayocc.firebaseapp.com",
      projectId: "railwayocc",
      storageBucket: "railwayocc.firebasestorage.app",
      messagingSenderId: "498444783840",
      appId: "1:498444783840:web:8503af90cd866d74c08085"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'railway-occ-sys-core'; // データベース内の保存先フォルダ名として使用

    // --- Configuration ---
    const DEFAULT_TRAINS = [
      { id: 'train-101', name: '車両 101編成', color: 'bg-slate-500' },
      { id: 'train-102', name: '車両 102編成', color: 'bg-slate-500' },
      { id: 'train-201', name: '特急 201編成', color: 'bg-red-500' },
    ];
    const initialTrainsData = DEFAULT_TRAINS.map((t, i) => ({
      ...t, status: 'info', details: '平常', order: i, crew: { driver: null, conductor: null }
    }));

    const DIRECTIVE_TYPES = {
      info: { label: '情報共有', color: 'bg-blue-500', text: 'text-blue-600 dark:text-blue-400', icon: 'info' },
      slow: { label: '徐行指令', color: 'bg-amber-500', text: 'text-amber-600 dark:text-amber-400', icon: 'alert-triangle' },
      stop: { label: '抑止(停止)', color: 'bg-red-600', text: 'text-red-600 dark:text-red-400', icon: 'shield-alert' },
      resume: { label: '運転再開', color: 'bg-emerald-500', text: 'text-emerald-600 dark:text-emerald-400', icon: 'check-circle' },
    };

    // --- App State ---
    let user = null;
    let trainsData = [];
    let directivesData = [];
    let chatMessagesData = [];       
    let globalChatMessagesData = []; 
    
    let currentRole = null;          
    let currentTrainId = null;       
    let currentCrewType = null;      
    
    let occSelectedTrainId = null;
    let occIsBroadcast = false;
    let occActiveDirectiveType = 'info';
    let isDarkMode = false;

    // 通知ベル制御用の未読追跡
    let globalUnreadCount = 0;
    let isInitialLoad = { directives: true, messages: true, global: true };

    const el = {
      loading: document.getElementById('loading-screen'),
      roleSelect: document.getElementById('role-selection-screen'),
      appRoot: document.getElementById('app-root'),
      trainSelect: document.getElementById('login-train-select'),
      btnDriver: document.getElementById('btn-login-driver'),
      btnConductor: document.getElementById('btn-login-conductor'),
      btnOcc: document.getElementById('btn-login-occ'),
      btnLogout: document.getElementById('btn-logout'),
      bellBadge: document.getElementById('notification-badge'),
      bellIcon: document.getElementById('bell-icon'),
      btnBell: document.getElementById('btn-notifications'),
      occTrainsGrid: document.getElementById('occ-trains-grid'),
      occDispatchPane: document.getElementById('occ-dispatch-pane'),
      btnBroadcast: document.getElementById('btn-broadcast'),
      tabBtnDispatch: document.getElementById('tab-btn-dispatch'),
      tabBtnChat: document.getElementById('tab-btn-chat'),
      tabBtnGlobalChat: document.getElementById('tab-btn-global-chat'),
      tabContentDispatch: document.getElementById('tab-content-dispatch'),
      tabContentChat: document.getElementById('tab-content-chat'),
      tabContentGlobalChat: document.getElementById('tab-content-global-chat'),
      occChatBadge: document.getElementById('occ-chat-badge'),
      occChatTargetName: document.getElementById('occ-chat-target-name'),
      occChatMessages: document.getElementById('occ-chat-messages'),
      occChatForm: document.getElementById('occ-chat-form'),
      occChatInput: document.getElementById('occ-chat-input'),
      btnSendOccChat: document.getElementById('btn-send-occ-chat'),
      occGlobalMessages: document.getElementById('occ-global-messages'),
      occGlobalChatForm: document.getElementById('occ-global-chat-form'),
      occGlobalChatInput: document.getElementById('occ-global-chat-input'),
      occEmptyState: document.getElementById('occ-empty-state'),
      occDirectiveForm: document.getElementById('occ-directive-form'),
      occFormTitle: document.getElementById('occ-form-title'),
      occTypeGrid: document.getElementById('occ-type-grid'),
      occDirectiveMsg: document.getElementById('occ-directive-msg'),
      btnSubmitDirective: document.getElementById('btn-submit-directive'),
      btnCloseOccForm: document.getElementById('btn-close-occ-form'),
      occDirectivesLog: document.getElementById('occ-directives-log'),
      trainCurrentStatus: document.getElementById('train-current-status'),
      trainCrewBadge: document.getElementById('train-crew-badge'),
      trainTabBtnLocal: document.getElementById('train-tab-btn-local'),
      trainTabBtnGlobal: document.getElementById('train-tab-btn-global'),
      trainChatLocalContainer: document.getElementById('train-chat-local-container'),
      trainChatGlobalContainer: document.getElementById('train-chat-global-container'),
      trainChatMessages: document.getElementById('train-chat-messages'),
      trainChatForm: document.getElementById('train-chat-form'),
      trainChatInput: document.getElementById('train-chat-input'),
      trainGlobalMessages: document.getElementById('train-global-messages'),
      trainGlobalChatForm: document.getElementById('train-global-chat-form'),
      trainGlobalChatInput: document.getElementById('train-global-chat-input'),
      trainDirectivesLog: document.getElementById('train-directives-log'),
    };

    // --- Authentication ---
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          try {
            await signInWithCustomToken(auth, __initial_auth_token);
          } catch (tokenErr) {
            console.warn("Custom token mismatch, falling back to anonymous sign-in.", tokenErr);
            await signInAnonymously(auth);
          }
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth Error:", err);
        // Fallback once more just in case
        signInAnonymously(auth).catch(e => console.error("Fallback Auth Error:", e));
      }
    };
    initAuth();

    onAuthStateChanged(auth, (currentUser) => {
      user = currentUser;
      if (user) {
        startBaseSync();
      }
    });

    // --- Notification Helper ---
    const updateNotificationBadge = () => {
      if (!el.bellBadge || !el.bellIcon) return;
      if (globalUnreadCount > 0) {
        el.bellBadge.textContent = globalUnreadCount > 99 ? '99+' : globalUnreadCount;
        el.bellBadge.classList.remove('hidden');
        el.bellIcon.classList.add('animate-ring');
        setTimeout(() => el.bellIcon.classList.remove('animate-ring'), 500);
      } else {
        el.bellBadge.classList.add('hidden');
      }
    };

    const processNewDocs = (changes, docType) => {
      if (!user) return;
      let hasNew = false;
      changes.forEach(change => {
        if (change.type === 'added') {
          const data = change.doc.data();
          if (data.senderUid !== user.uid) {
            if (currentRole === 'occ' && docType === 'messages' && data.trainId !== occSelectedTrainId) {
              globalUnreadCount++;
              hasNew = true;
            } else if (currentRole === 'train' && docType === 'messages' && data.trainId !== currentTrainId) {
              // 自車以外の個別メッセージはスキップ
            } else {
              globalUnreadCount++;
              hasNew = true;
            }
          }
        }
      });
      if (hasNew) updateNotificationBadge();
    };

    el.btnBell?.addEventListener('click', () => {
      globalUnreadCount = 0;
      updateNotificationBadge();
    });

    // --- Base Sync (Trains) ---
    const startBaseSync = () => {
      if (!user) return;
      try {
        const trainsRef = collection(db, 'artifacts', appId, 'public', 'data', 'trains');
        onSnapshot(trainsRef, async (snapshot) => {
          if (snapshot.empty) {
            for (let i = 0; i < initialTrainsData.length; i++) {
              const t = initialTrainsData[i];
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trains', t.id), { ...t, updatedAt: serverTimestamp() });
            }
          } else {
            trainsData = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order);
            updateRoleSelectOptions();
            if (currentRole === 'occ') renderOccTrainsGrid();
            if (currentRole === 'train') renderTrainStatus();
            
            el.loading?.classList.add('hidden');
            if (!currentRole) el.roleSelect?.classList.remove('hidden');
          }
        }, (error) => {
          console.error("Trains Snapshot Sync Failed", error);
          if(el.loading) el.loading.innerHTML = `<div class="text-red-500 text-center"><p class="font-bold">接続エラー</p><p class="text-xs mt-2">Firebase設定を正しく更新してください。</p></div>`;
        });
      } catch (e) {
        console.error("Trains Init Failed", e);
      }
    };

    // --- Detailed Sync ---
    const startDetailedSync = () => {
      if (!user) return;
      
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'directives'), (snapshot) => {
        // タイムスタンプの安全なソート処理に修正
        directivesData = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0));
        if (!isInitialLoad.directives) processNewDocs(snapshot.docChanges(), 'directives');
        isInitialLoad.directives = false;
        
        if (currentRole === 'occ') renderDirectivesLog(el.occDirectivesLog, directivesData);
        if (currentRole === 'train') renderDirectivesLog(el.trainDirectivesLog, directivesData);
      });

      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), (snapshot) => {
        chatMessagesData = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.timestamp?.toMillis?.() || 0) - (b.timestamp?.toMillis?.() || 0));
        if (!isInitialLoad.messages) processNewDocs(snapshot.docChanges(), 'messages');
        isInitialLoad.messages = false;

        if (currentRole === 'occ' && occSelectedTrainId) renderChatMessages(el.occChatMessages, occSelectedTrainId, 'occ', false);
        if (currentRole === 'train') renderChatMessages(el.trainChatMessages, currentTrainId, currentCrewType, false);
      });

      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'global_messages'), (snapshot) => {
        globalChatMessagesData = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.timestamp?.toMillis?.() || 0) - (b.timestamp?.toMillis?.() || 0));
        if (!isInitialLoad.global) processNewDocs(snapshot.docChanges(), 'global');
        isInitialLoad.global = false;

        if (currentRole === 'occ') renderChatMessages(el.occGlobalMessages, 'GLOBAL', 'occ', true);
        if (currentRole === 'train') renderChatMessages(el.trainGlobalMessages, 'GLOBAL', currentCrewType, true);
      });
    };

    // --- Role Selection Setup ---
    const updateRoleSelectOptions = () => {
      if(!el.trainSelect) return;
      const currentVal = el.trainSelect.value;
      el.trainSelect.innerHTML = '<option value="">担当車両を選択してください</option>';
      trainsData.forEach(t => {
        el.trainSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`;
      });
      el.trainSelect.value = currentVal;
    };

    el.trainSelect?.addEventListener('change', e => {
      if(el.btnDriver) el.btnDriver.disabled = !e.target.value;
      if(el.btnConductor) el.btnConductor.disabled = !e.target.value;
    });

    const joinAsCrew = async (type) => {
      const tId = el.trainSelect?.value;
      if (!tId || !user) return;
      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trains', tId), { [`crew.${type}`]: user.uid });
      currentRole = 'train'; currentTrainId = tId; currentCrewType = type;
      setupTrainUI(); startDetailedSync();
    };

    el.btnDriver?.addEventListener('click', () => joinAsCrew('driver'));
    el.btnConductor?.addEventListener('click', () => joinAsCrew('conductor'));
    el.btnOcc?.addEventListener('click', () => { currentRole = 'occ'; setupOccUI(); startDetailedSync(); });

    el.btnLogout?.addEventListener('click', () => location.reload());

    // --- OCC Interface ---
    const setupOccUI = () => {
      el.roleSelect?.classList.add('hidden'); 
      el.appRoot?.classList.remove('hidden');
      el.occView?.classList.remove('hidden');
      el.btnBroadcast?.classList.remove('hidden');
      el.btnBroadcast?.classList.add('flex');
      if(el.headerIcon) el.headerIcon.innerHTML = '<i data-lucide="radio" class="w-5 h-5 lg:w-6 lg:h-6 animate-pulse"></i>';
      lucide.createIcons();
      renderOccTrainsGrid();
      
      if(el.occTypeGrid) {
        el.occTypeGrid.innerHTML = '';
        Object.entries(DIRECTIVE_TYPES).forEach(([key, conf]) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'type-btn p-2 text-xs font-bold rounded border transition-all';
          btn.innerHTML = `<i data-lucide="${conf.icon}" class="w-3.5 h-3.5 lg:w-4 lg:h-4 inline mr-1"></i>${conf.label}`;
          btn.onclick = () => selectOccDirectiveType(key);
          el.occTypeGrid.appendChild(btn);
        });
        selectOccDirectiveType('info');
      }
    };

    const renderOccTrainsGrid = () => {
      if(!el.occTrainsGrid) return;
      el.occTrainsGrid.innerHTML = trainsData.map(t => {
        const isSel = occSelectedTrainId === t.id && !occIsBroadcast;
        const conf = DIRECTIVE_TYPES[t.status] || DIRECTIVE_TYPES.info;
        
        // 過去のデータにcrew情報が無い場合のエラー回避
        const crew = t.crew || {};
        const crewStr = (crew.driver || crew.conductor) ? `<span class="bg-emerald-100 text-emerald-700 px-1.5 rounded text-[9px] font-bold">乗務中</span>` : '';
        
        return `
          <button class="text-left relative border rounded-xl p-3 transition-all ${isSel ? 'ring-2 ring-blue-500 bg-blue-50/50 dark:bg-slate-800' : 'bg-white dark:bg-slate-900'}" onclick="window.selectTrain('${t.id}')">
            <div class="absolute left-0 top-0 bottom-0 w-1.5 ${t.color} rounded-l-xl"></div>
            <div class="pl-3 flex flex-col h-full min-h-[4.5rem]">
              <div class="flex justify-between items-start">
                <div class="font-bold text-xs lg:text-sm">${t.name}</div>${crewStr}
              </div>
              <div class="${conf.text} font-bold text-[10px] lg:text-xs my-1"><i data-lucide="${conf.icon}" class="w-3.5 h-3.5 inline"></i> ${conf.label}</div>
              <div class="text-[10px] lg:text-xs text-slate-500 line-clamp-1 mt-auto">${t.details}</div>
            </div>
          </button>
        `;
      }).join('');
      lucide.createIcons();
    };

    window.selectTrain = (id) => {
      occIsBroadcast = false; occSelectedTrainId = id;
      renderOccTrainsGrid();
      
      const t = trainsData.find(x => x.id === id);
      el.occEmptyState?.classList.add('hidden');
      el.occDirectiveForm?.classList.remove('hidden');
      if(el.occFormTitle) el.occFormTitle.textContent = `${t.name} への指令`;
      if(el.btnSubmitDirective) el.btnSubmitDirective.className = "w-full py-2 bg-blue-600 text-white rounded-lg font-bold text-xs shadow hover:bg-blue-500 shrink-0";
      selectOccDirectiveType(t.status || 'info');
      
      if(el.occChatTargetName) el.occChatTargetName.textContent = `${t.name} との個別連絡`;
      if(el.occChatInput) el.occChatInput.disabled = false;
      if(el.btnSendOccChat) el.btnSendOccChat.disabled = false;
      renderChatMessages(el.occChatMessages, id, 'occ', false);
    };

    el.btnBroadcast?.addEventListener('click', () => {
      occSelectedTrainId = null; occIsBroadcast = true;
      renderOccTrainsGrid();
      el.occEmptyState?.classList.add('hidden');
      el.occDirectiveForm?.classList.remove('hidden');
      if(el.occFormTitle) el.occFormTitle.innerHTML = "<span class='text-red-600'>【緊急】全車両 一斉指令</span>";
      if(el.btnSubmitDirective) el.btnSubmitDirective.className = "w-full py-2 bg-red-600 text-white rounded-lg font-bold text-xs shadow hover:bg-red-500 shrink-0";
      switchOccTab('dispatch');
    });

    const selectOccDirectiveType = (key) => {
      occActiveDirectiveType = key;
      if(!el.occTypeGrid) return;
      const btns = el.occTypeGrid.children;
      Array.from(btns).forEach((btn, i) => {
        const k = Object.keys(DIRECTIVE_TYPES)[i];
        btn.className = k === key ? `type-btn p-2 text-[10px] font-bold rounded text-white ${DIRECTIVE_TYPES[k].color}` : `type-btn p-2 text-[10px] font-bold rounded border bg-slate-50 dark:bg-slate-900 text-slate-500`;
      });
    };

    const switchOccTab = (tab) => {
      if(el.tabBtnDispatch) el.tabBtnDispatch.className = `flex-1 py-2 lg:py-3 text-xs font-bold border-b-2 transition-all ${tab === 'dispatch' ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500'}`;
      if(el.tabBtnChat) el.tabBtnChat.className = `flex-1 py-2 lg:py-3 text-xs font-bold border-b-2 transition-all ${tab === 'chat' ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500'}`;
      if(el.tabBtnGlobalChat) el.tabBtnGlobalChat.className = `flex-1 py-2 lg:py-3 text-xs font-bold border-b-2 transition-all ${tab === 'global' ? 'border-red-500 text-red-600' : 'border-transparent text-slate-500'}`;

      el.tabContentDispatch?.classList.toggle('hidden', tab !== 'dispatch');
      el.tabContentChat?.classList.toggle('hidden', tab !== 'chat');
      el.tabContentGlobalChat?.classList.toggle('hidden', tab !== 'global');

      if (tab === 'chat' && occSelectedTrainId) {
          renderChatMessages(el.occChatMessages, occSelectedTrainId, 'occ', false);
          el.occChatBadge?.classList.add('hidden');
      }
      if (tab === 'global') renderChatMessages(el.occGlobalMessages, 'GLOBAL', 'occ', true);
    };
    el.tabBtnDispatch?.addEventListener('click', () => switchOccTab('dispatch'));
    el.tabBtnChat?.addEventListener('click', () => { if(occSelectedTrainId) switchOccTab('chat'); });
    el.tabBtnGlobalChat?.addEventListener('click', () => switchOccTab('global'));

    el.btnCloseOccForm?.addEventListener('click', () => {
      el.occDispatchPane?.classList.add('translate-y-full');
    });

    // 指令フォーム送信
    el.occDirectiveForm?.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!user) return;
      const msg = el.occDirectiveMsg?.value.trim() || `【${DIRECTIVE_TYPES[occActiveDirectiveType].label}】指令を発令。`;
      if (occIsBroadcast) {
        await Promise.all(trainsData.map(t => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trains', t.id), { status: occActiveDirectiveType, details: `【一斉】${msg}` })));
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'directives'), { trainId: 'ALL', trainName: '全車両', type: occActiveDirectiveType, message: msg, timestamp: serverTimestamp(), senderUid: user.uid });
      } else {
        const t = trainsData.find(x => x.id === occSelectedTrainId);
        if(t) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trains', t.id), { status: occActiveDirectiveType, details: msg });
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'directives'), { trainId: t.id, trainName: t.name, type: occActiveDirectiveType, message: msg, timestamp: serverTimestamp(), senderUid: user.uid });
        }
      }
      if(el.occDirectiveMsg) el.occDirectiveMsg.value = '';
      if (window.innerWidth < 1024 && el.occDispatchPane) el.occDispatchPane.classList.add('translate-y-full');
    });

    // --- Crew Interface ---
    const setupTrainUI = () => {
      el.roleSelect?.classList.add('hidden'); 
      el.appRoot?.classList.remove('hidden');
      el.trainView?.classList.remove('hidden');
      const t = trainsData.find(x => x.id === currentTrainId);
      if(el.headerIcon) el.headerIcon.innerHTML = '<i data-lucide="train" class="w-5 h-5 text-emerald-500"></i>';
      if(el.headerTitle) el.headerTitle.textContent = t ? t.name : 'Train';
      if(el.headerSubtitle) el.headerSubtitle.textContent = currentCrewType === 'driver' ? '運転士' : '車掌';
      lucide.createIcons();
      renderTrainStatus();
    };

    const renderTrainStatus = () => {
      const t = trainsData.find(x => x.id === currentTrainId);
      if (!t || !el.trainCurrentStatus) return;
      const conf = DIRECTIVE_TYPES[t.status] || DIRECTIVE_TYPES.info;
      el.trainCurrentStatus.innerHTML = `
        <div class="${conf.color} text-white p-1 rounded"><i data-lucide="${conf.icon}" class="w-4 h-4"></i></div>
        <div>
          <div class="font-bold text-xs ${conf.text}">${conf.label}</div>
          <div class="text-[10px] text-slate-600 dark:text-slate-300 line-clamp-1">${esc(t.details)}</div>
        </div>
      `;
      if(el.trainCrewBadge) el.trainCrewBadge.innerHTML = getCrewStatusHTML(t.crew);
      lucide.createIcons();
    };

    el.trainTabBtnLocal?.addEventListener('click', () => {
      if(el.trainTabBtnLocal) el.trainTabBtnLocal.className = "flex-1 py-2 text-[10px] font-bold border-b-2 border-emerald-500 text-emerald-600";
      if(el.trainTabBtnGlobal) el.trainTabBtnGlobal.className = "flex-1 py-2 text-[10px] font-bold border-b-2 border-transparent text-slate-500 flex justify-center gap-1";
      el.trainChatLocalContainer?.classList.remove('hidden');
      el.trainChatGlobalContainer?.classList.add('hidden');
    });
    el.trainTabBtnGlobal?.addEventListener('click', () => {
      if(el.trainTabBtnGlobal) el.trainTabBtnGlobal.className = "flex-1 py-2 text-[10px] font-bold border-b-2 border-red-500 text-red-600 flex justify-center gap-1";
      if(el.trainTabBtnLocal) el.trainTabBtnLocal.className = "flex-1 py-2 text-[10px] font-bold border-b-2 border-transparent text-slate-500";
      el.trainChatGlobalContainer?.classList.remove('hidden');
      el.trainChatLocalContainer?.classList.add('hidden');
    });

    // --- Chat Sender Methods ---
    const sendMsg = async (col, trainId, role, name, inputId) => {
      if (!user) return;
      const inputEl = document.getElementById(inputId);
      if(!inputEl) return;
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), {
        trainId, senderRole: role, senderName: name, senderUid: user.uid, text, timestamp: serverTimestamp(), readBy: []
      });
    };

    el.occChatForm?.addEventListener('submit', e => { e.preventDefault(); sendMsg('messages', occSelectedTrainId, 'occ', '指令所', 'occ-chat-input'); });
    el.occGlobalChatForm?.addEventListener('submit', e => { e.preventDefault(); sendMsg('global_messages', 'ALL', 'occ', '指令所(一斉)', 'occ-global-chat-input'); });
    
    el.trainChatForm?.addEventListener('submit', e => { e.preventDefault(); sendMsg('messages', currentTrainId, currentCrewType, `車両${currentTrainId.replace('train-','')}`, 'train-chat-input'); });
    el.trainGlobalChatForm?.addEventListener('submit', e => { e.preventDefault(); sendMsg('global_messages', 'ALL', currentCrewType, `車両${currentTrainId.replace('train-','')}`, 'train-global-chat-input'); });

    // --- Chat Rendering & Read Status ---
    const renderChatMessages = (container, targetId, myRole, isGlobal) => {
      if (!user || !container) return;
      const list = isGlobal ? globalChatMessagesData : chatMessagesData.filter(c => c.trainId === targetId);
      if (list.length === 0) {
        container.innerHTML = '<div class="text-center text-xs text-slate-400 mt-4">メッセージはありません。</div>';
        return;
      }

      let isTabActive = false;
      if (currentRole === 'occ') {
          if (isGlobal && !el.tabContentGlobalChat?.classList.contains('hidden')) isTabActive = true;
          if (!isGlobal && !el.tabContentChat?.classList.contains('hidden') && occSelectedTrainId === targetId) isTabActive = true;
      } else if (currentRole === 'train') {
          if (isGlobal && !el.trainChatGlobalContainer?.classList.contains('hidden')) isTabActive = true;
          if (!isGlobal && !el.trainChatLocalContainer?.classList.contains('hidden') && currentTrainId === targetId) isTabActive = true;
      }

      container.innerHTML = list.map(c => {
        const isMe = c.senderUid === user.uid;
        const readArray = c.readBy || [];
        const readCount = readArray.filter(uid => uid !== c.senderUid).length;
        const readStatusStr = readCount > 0 ? (isGlobal ? `既読 ${readCount}` : '既読') : '未読';

        // 自動既読処理
        if (!isMe && isTabActive && !readArray.includes(user.uid)) {
            const colName = isGlobal ? 'global_messages' : 'messages';
            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, c.id), { readBy: arrayUnion(user.uid) }).catch(err => console.error("Read receipt error", err));
        }

        if (isGlobal) {
          return `
            <div class="flex flex-col ${c.senderRole==='occ' ? 'items-end' : 'items-start'} w-full mb-2">
              <div class="text-[9px] text-red-500 font-bold mb-0.5">📢 ${c.senderName}</div>
              <div class="flex items-end gap-1 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                <div class="${c.senderRole==='occ' ? 'chat-bubble-global-self' : 'chat-bubble-global-other'} px-3 py-1.5 rounded-xl text-xs max-w-[85%] shadow-sm">${esc(c.text)}</div>
                ${isMe ? `<div class="text-[8px] lg:text-[9px] ${readCount > 0 ? 'text-blue-500 font-bold' : 'text-slate-400'} mb-1 whitespace-nowrap">${readStatusStr}</div>` : ''}
              </div>
            </div>
          `;
        } else {
          return `
            <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full mb-2">
              <div class="text-[9px] text-slate-500 mb-0.5">${esc(c.senderName)}</div>
              <div class="flex items-end gap-1 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                <div class="${isMe ? 'chat-bubble-self' : 'chat-bubble-other'} px-3 py-1.5 rounded-xl text-xs max-w-[85%] shadow-sm">${esc(c.text)}</div>
                ${isMe ? `<div class="text-[8px] lg:text-[9px] ${readCount > 0 ? 'text-blue-500 font-bold' : 'text-slate-400'} mb-1 whitespace-nowrap">${readStatusStr}</div>` : ''}
              </div>
            </div>
          `;
        }
      }).join('');
      container.scrollTop = container.scrollHeight;
    };

    const renderDirectivesLog = (container, data) => {
      if(!container) return;
      container.innerHTML = data.map(d => {
        const conf = DIRECTIVE_TYPES[d.type] || DIRECTIVE_TYPES.info;
        const isAll = d.trainId === 'ALL';
        return `
          <div class="bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded p-2 shadow-sm mb-1.5">
            <div class="text-[10px] font-bold ${isAll ? 'text-red-600' : ''}"><span class="${conf.text}"><i data-lucide="${conf.icon}" class="inline w-3 h-3"></i></span> ${d.trainName}</div>
            <p class="text-[10px] lg:text-xs text-slate-600 dark:text-slate-400 mt-0.5">${d.message}</p>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    };

    // --- Helpers ---
    const getCrewStatusHTML = (c) => {
      if (!c) return '';
      if (c.driver && !c.conductor) return `<span class="bg-indigo-100 text-indigo-700 border border-indigo-200 px-1.5 py-0.5 rounded text-[10px] font-bold">ワンマン</span>`;
      if (c.driver && c.conductor) return `<span class="bg-emerald-100 text-emerald-700 border border-emerald-200 px-1.5 py-0.5 rounded text-[10px] font-bold">ツーマン</span>`;
      if (!c.driver && c.conductor) return `<span class="bg-orange-100 text-orange-700 border border-orange-200 px-1.5 py-0.5 rounded text-[10px] font-bold">車掌のみ</span>`;
      return `<span class="text-slate-400 text-[10px]">待機中</span>`;
    };

    function esc(s) { if(typeof s !== 'string') return ''; return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

    document.getElementById('btn-theme-toggle')?.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      document.documentElement.classList.toggle('dark', isDarkMode);
      const icon = document.getElementById('theme-icon');
      if(icon) icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
      lucide.createIcons();
    });

  </script>
</body>
</html>
